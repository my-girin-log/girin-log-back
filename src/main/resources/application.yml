spring:
  application:
    name: girin-log
  datasource:
    # PostgreSQL 우선 (conventions/coding.md 0절). 값은 환경변수로 주입한다.
    url: ${DB_URL:jdbc:postgresql://localhost:5432/girinlog}
    username: ${DB_USERNAME:girinlog}
    password: ${DB_PASSWORD:girinlog}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # 운영에서는 절대 update/create 금지. 스키마는 마이그레이션으로 관리한다.
      ddl-auto: ${JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}
  servlet:
    encoding:
      charset: UTF-8
      force: true

# 도메인 정책 상수의 기본값(코드의 상수와 동기화 유지). conventions/api.md 참고.
girinlog:
  time:
    zone: Asia/Seoul
    day-boundary-hour: 6   # 이 서비스의 "하루"는 06:00 KST 에 바뀐다.
  conversation:
    max-follow-up-count: 10
  # 자체 JWT (HMAC-SHA256, Bearer, Access 단독). 시크릿은 환경변수로만 주입(커밋 금지, 32자 이상).
  jwt:
    secret: ${GIRINLOG_JWT_SECRET:}
    access-token-ttl: ${GIRINLOG_JWT_TTL:P14D}   # ISO-8601 Duration. 기본 14일.
  # GitHub OAuth (수동 흐름: /api/auth/github → callback). 자격증명은 환경변수로만.
  oauth:
    github:
      client-id: ${GITHUB_CLIENT_ID:}
      client-secret: ${GITHUB_CLIENT_SECRET:}
      redirect-uri: ${GITHUB_REDIRECT_URI:http://localhost:8080/api/auth/github/callback}
      frontend-redirect-uri: ${FRONTEND_REDIRECT_URI:http://localhost:3000/oauth/callback}
      scope: read:user
  silok:
    gemini:
      api-key: ${GEMINI_API_KEY:}
      base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
      model: ${GEMINI_MODEL:gemini-2.0-flash}
      timeout: ${GEMINI_TIMEOUT:PT30S}
